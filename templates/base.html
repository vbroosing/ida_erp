{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IDA ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'root/css/styles.css' %}">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <h4 class="text-white text-center py-3 border-bottom border-secondary">IDA ERP</h4>
                
                <a href="#catalogSubmenu" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-decoration-none">
                    <span>Catálogo</span>
                    <span class="dropdown-toggle"></span>
                </a>
                <div class="collapse show bg-dark" id="catalogSubmenu">
                    <a href="{% url 'product_list' %}" class="ps-5 py-2 small text-light text-decoration-none">Productos</a>
                    <a href="{% url 'brand_list' %}" class="ps-5 py-2 small text-light text-decoration-none">Marcas</a>
                    <a href="{% url 'category_list' %}" class="ps-5 py-2 small text-light text-decoration-none">Categorías</a>
                    <a href="{% url 'unit_list' %}" class="ps-5 py-2 small text-light text-decoration-none">Unidades de Medida</a>
                </div>

                <a href="#inventorySubmenu" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-decoration-none">
                    <span>Inventario</span>
                    <span class="dropdown-toggle"></span>
                </a>
                <div class="collapse show bg-dark" id="inventorySubmenu">
                    <a href="{% url 'stock_list' %}" class="ps-5 py-2 small text-light text-decoration-none">Stock Maestro</a>
                </div>

                <a href="#purchasesSubmenu" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-decoration-none">
                    <span>Compras</span>
                    <span class="dropdown-toggle"></span>
                </a>
                <div class="collapse show bg-dark" id="purchasesSubmenu">
                    <a href="{% url 'po_list' %}" class="ps-5 py-2 small text-light text-decoration-none">Órdenes de Compra</a>
                </div>

                <a href="#logisticSubmenu" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-decoration-none">
                    <span>Logística</span>
                    <span class="dropdown-toggle"></span>
                </a>
                <div class="collapse bg-dark" id="logisticSubmenu">
                    <a href="#" class="ps-5 py-2 small text-light text-muted text-decoration-none">Despachos (Próximamente)</a>
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            
            <div class="col-md-10 content-area">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
