<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IDA ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 10px 15px; display: block; }
        .sidebar a:hover { background-color: #34495e; }
        .content-area { padding: 20px; background-color: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <h4 class="text-white text-center py-3 border-bottom border-secondary">IDA ERP</h4>
                
                <a href="#catalogSubmenu" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
                    <span>📦 Catálogo</span>
                    <span class="dropdown-toggle"></span>
                </a>
                <div class="collapse show bg-dark" id="catalogSubmenu"> <a href="{% url 'product_list' %}" class="ps-5 py-2 small text-light">Productos</a>
                    <a href="#" class="ps-5 py-2 small text-light text-muted">Marcas (Próximamente)</a>
                    <a href="#" class="ps-5 py-2 small text-light text-muted">Categorías (Próximamente)</a>
                    <a href="#" class="ps-5 py-2 small text-light text-muted">Unidades (Próximamente)</a>
                </div>

                <a href="#">🏭 Inventario</a>
                <a href="#">🛒 Compras</a>
                <a href="#">🚚 Logística</a>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            
            <div class="col-md-10 content-area">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
